baseURL = "https://example.pages.dev/"
languageCode = "en-gb"
title = "Agentic AI & LLM Weekly"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
pagerSize = 10

[outputs]
home = ["HTML", "RSS", "JSON"]

[params]
env = "production"
title = "Agentic AI & LLM Weekly"
description = "Weekly digest of agentic AI and LLM developments — curated by Claude Code."
keywords = ["AI", "LLM", "agentic", "newsletter"]
DateFormat = "2 January 2006"
defaultTheme = "auto"
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
ShowRssButtonInSectionTermList = true
disableScrollToTop = false

[params.homeInfoParams]
Title = "Agentic AI & LLM Weekly"
Content = "Curated weekly digest of agentic AI and LLM developments — research, security, products, and policy. New issues every Friday."

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

[[menu.main]]
identifier = "archives"
name = "Archive"
url = "/archives/"
weight = 10

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 20

[markup.goldmark.renderer]
unsafe = true
